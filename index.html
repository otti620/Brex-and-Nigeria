
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brex - Modern Wealth & Yield</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,850;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            background-color: #FAF8F5;
        }
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Flutter-like Spring Easing */
        .spring-transition {
            transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        /* Smooth Hardware Acceleration */
        .gpu {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000;
            will-change: transform, opacity;
        }
        /* Mobile Safe Areas */
        .safe-pb {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .safe-pt {
            padding-top: env(safe-area-inset-top);
        }
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-[#112C1E] bg-[#FAF8F5] antialiased select-none">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
